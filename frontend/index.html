<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LandcareLink — Community Groups</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>🌿 LandcareLink</h1>
      <p>Community environmental groups directory</p>
    </header>

    <main>
      <!-- 1. Map — full width, tall -->
      <section class="panel map-panel">
        <div id="map"></div>
        <div class="legend">
          <span
            ><i class="dot" style="background: #2e7d32"></i> Environmental
            group</span
          >
          <span
            ><i class="dot" style="background: #1565c0"></i> Catchment
            collective</span
          >
          <span
            ><i class="dot" style="background: #ef6c00"></i> Catchment
            group</span
          >
        </div>
      </section>

      <section class="panel filter-panel">
        <!-- Filter & search bar (client-side, against loaded data) -->
        <div class="filter-bar">
          <input
            type="search"
            id="search-input"
            placeholder="Search name, region, or email…"
          />
          <select id="type-filter">
            <option value="">All types</option>
            <option value="environmental_group">Environmental group</option>
            <option value="catchment_collective">Catchment collective</option>
            <option value="catchment_group">Catchment group</option>
          </select>
          <select id="region-filter">
            <option value="">All regions</option>
          </select>
          <button type="button" id="clear-filters" class="secondary">
            Clear filters
          </button>
          <span id="filter-count" class="filter-count"></span>
        </div>
      </section>

      <!-- 2. All groups — full width. Handles both adding (inline empty row)
           and listing/editing. -->
      <section class="panel table-panel">
        <h2>All groups</h2>

        <table id="groups-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Region</th>
              <th>Email</th>
              <th>Lat</th>
              <th>Long</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="groups-body"></tbody>
        </table>
        <p id="form-error" class="form-error"></p>
        <p id="empty-msg" class="hidden">
          No groups yet — add one in the row above.
        </p>
      </section>
    </main>

    <!-- Leaflet -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
