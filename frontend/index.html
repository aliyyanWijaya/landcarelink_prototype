<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandcareLink — Community Groups</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>🌿 LandcareLink</h1>
    <p>Community environmental groups directory</p>
  </header>

  <main>
    <section class="panel">
      <h2 id="form-title">Add a group</h2>
      <form id="group-form" autocomplete="off">
        <input type="hidden" id="group-id" />

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="field">
          <label for="type">Type</label>
          <select id="type" required>
            <option value="environmental_group">Environmental group</option>
            <option value="catchment_collective">Catchment collective</option>
            <option value="catchment_group">Catchment group</option>
          </select>
        </div>

        <div class="field">
          <label for="region">Region</label>
          <input type="text" id="region" required />
        </div>

        <div class="field">
          <label for="contact_email">Contact email</label>
          <input type="email" id="contact_email" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="latitude">Latitude</label>
            <input type="number" id="latitude" step="any" min="-90" max="90" required />
          </div>
          <div class="field">
            <label for="longitude">Longitude</label>
            <input type="number" id="longitude" step="any" min="-180" max="180" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Save group</button>
          <button type="button" id="cancel-btn" class="secondary hidden">Cancel</button>
        </div>
        <p id="form-error" class="form-error"></p>
      </form>

      <div class="legend">
        <span><i class="dot" style="background:#2e7d32"></i> Environmental group</span>
        <span><i class="dot" style="background:#1565c0"></i> Catchment collective</span>
        <span><i class="dot" style="background:#ef6c00"></i> Catchment group</span>
      </div>
    </section>

    <section class="panel map-panel">
      <div id="map"></div>
    </section>
  </main>

  <section class="panel table-panel">
    <h2>All groups</h2>
    <table id="groups-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Region</th>
          <th>Email</th>
          <th>Lat</th>
          <th>Lng</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="groups-body"></tbody>
    </table>
    <p id="empty-msg" class="hidden">No groups yet — add one above.</p>
  </section>

  <!-- Leaflet -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="js/app.js"></script>
</body>
</html>
